; PB-1000 debug run settings
; Values are loaded by main_debug.py

[run]
enable_display_refresh = true
frame_interval_ms = 1000
step_service_chunk = 32
step_block = 1000
step_timer_tick_steps = 40000

auto_exe_on_enter = false
; key_hold_ms:
;   キー押下を維持する「通常目標時間」(ms)。
;   スキャン完了で早めに解放されることがあり、必ずこの時間ぴったり保持するわけではありません。
key_hold_ms = 500

; key_release_hard_timeout_ms:
;   スキャンが進まず解放条件を満たせない場合に備えた「強制解放の上限待ち時間」(ms)。
;   フェイルセーフ用途で、長すぎる押しっぱなしを防ぎます。
key_release_hard_timeout_ms = 3000
inter_key_gap_ms = 80

; one-shot input after startup delay (auto_inject_interval_ms)
; examples: 1   /   1|+|2|EXE
auto_inject_key = 
auto_inject_interval_ms = 1500

# スキャンウィンドウを延長
scan_window_wait_ms = 10000
# キーアイドル待ちを短く
key_commit_timeout_ms=6000
key_idle_wait_ms=3000

[trace]
trace_every_steps = 0
key_trace_pc = none
key_trace_window_steps = 128
key_trace_min_print_ms = 120

trace_steps = 5000
trace_steps_per_loop = 16
trace_trigger_label = EXE
trace_exit_on_finish = false
trace_dump_on_finish = true
trace_output = file
;trace_output = console
trace_output_path = /log/trace_after_exe.log
trace_output_rotate_per_run = true
trace_service_input_every = 64

; comma-separated addresses (supports hex like 0x08AA)
trace_reg_dump_pcs = 0x060F,0x0610,0x061F,0x0621,0x0628,0x062C,0x0632,0x0634,0x082B,0x8F10,0x8F14,0x8F16,0x8F19,0x8F23
trace_loop_sample_pcs =
trace_loop_sample_max_per_pc = 12

[debug]
sys = true
lcd = false
kb = true
; Override C direct paths even when sys=true
c_memory = true
c_lcd = true

