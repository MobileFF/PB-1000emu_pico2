; PB-1000 Emulator Configuration
;
; 読み込み優先順位（低→高）:
;   /pb1000.ini       ← このファイル (Pico フラッシュのルートに配置)
;   /sd/pb1000.ini
;   <profile>/pb1000.ini
;
; 記述したキーのみ上書きされます。省略した項目はデフォルト値を使用します。
; コメントは ; または # で始めます。

; -----------------------------------------------------------------------------
[keyboard]
; -----------------------------------------------------------------------------

; USBキーボードを有効にする
; enable_usb_kbd = true

; UARTキーボードを有効にする
enable_uart_kbd = true
uart_baudrate   = 115200
uart_tx_pin     = 4
uart_rx_pin     = 5


; キー押下継続時間 (ms)
; key_hold_ms = 120

; キーリリース強制タイムアウト (ms)
; key_release_hard_timeout_ms = 1200

; キー間のギャップ (ms)
; inter_key_gap_ms = 80


; -----------------------------------------------------------------------------
[emulator]
; -----------------------------------------------------------------------------

; フレーム更新間隔 (ms) — 33ms ≒ 30fps
; frame_interval_ms = 33

; 1スライスあたりのCPUステップ数
active_step_count = 12000

; スリープ中のポーリング間隔 (ms)
; sleep_poll_ms = 10

; タイマーティック換算ステップ数
; step_timer_tick_steps = 8000

; メインループのアイドル待機 (ms)
; loop_idle_ms = 1


; -----------------------------------------------------------------------------
[disk]
; -----------------------------------------------------------------------------

; 仮想FDDを有効にする
enabled = true

; ストレージバックエンド: raw
backend = raw

; ディスクイメージファイルのパス
path = /sd/disks/disk1.img

; 読み取り専用
readonly = false


; -----------------------------------------------------------------------------
[profile]
; -----------------------------------------------------------------------------

; 起動時のデフォルトプロファイル名
; default_profile = default

; プロファイル選択UIのタイムアウト (ms)
;ui_timeout_ms = 30000


; -----------------------------------------------------------------------------
[joystick]
; -----------------------------------------------------------------------------

; Atari 9ピンジョイスティックを有効にする
enable = true

; FIRE2ボタンを有効にする
enable_fire2 = true

; デバウンス時間 (ms)
; debounce_ms = 20

; ポーリング間隔 (ms)
; poll_interval_ms = 10

; キーマッピング
;   指定方法:
;     名前    : exe, ans, shift, up, down, left, right, bs, ins, brk,
;               newall, menu, cal, cls, kana, a-z, 0-9
;     座標直接: row,col  例) 10,4
;   省略するとデフォルト値を使用します。
;
; key_up    = up      ; デフォルト: カーソル上
; key_down  = down    ; デフォルト: カーソル下
; key_left  = left    ; デフォルト: カーソル左
; key_right = right   ; デフォルト: カーソル右
; key_fire1 = exe     ; デフォルト: EXE
; key_fire2 = shift   ; デフォルト: SHIFT

[beep]
enable   = true
gpio_pin = 14
freq_hz  = 4470
duty     = 30


; -----------------------------------------------------------------------------
[pio_uart]
; -----------------------------------------------------------------------------

; PIO UART (RS-232C) のボーレート (GP6=TX / GP13=RX)
baudrate = 9600
