; PB-1000 Emulator Configuration
;
; 読み込み優先順位（低→高）:
;   /pb1000.ini       ← このファイル (Pico フラッシュのルートに配置)
;   /sd/pb1000.ini
;   <profile>/pb1000.ini
;
; 記述したキーのみ上書きされます。省略した項目はデフォルト値を使用します。
; コメントは ; または # で始めます。

; -----------------------------------------------------------------------------
[display]
; -----------------------------------------------------------------------------

; ディスプレイドライバを選択する
;   ILI9341 : 320x240 (デフォルト)
;   ST7796  : 480x320 (MSP4021等)
;driver = ILI9341
driver = ST7796
;spi_baudrate = 26000000

; エミュレータ画面の拡大倍率
;   ILI9341 用: 1.5 (推奨)
;   ST7796  用: 2.0 (推奨)
;scale = 1.5
scale = 2.0

; LCD縦解像度: 32 = PB-1000オリジナル (デフォルト), 64 = 拡張モード
; 64ドットモードでは、rowアドレスのBit<2>が有効になり、pages 4-7 (行32-63) に書き込み可能
;lcd_height = 32
lcd_height = 64

; 画面上の表示位置オフセット
;   x_offset: LCD左端のX座標。省略時はLCDが水平センタリングされます。
;   y_offset: LCD上端のY座標。省略時はLCD＋シートキーバー全体が垂直センタリングされます。
;             値を小さくするほど上寄りに表示されます。
; x_offset = 48
; y_offset = 95


; -----------------------------------------------------------------------------
[keyboard]
; -----------------------------------------------------------------------------

; USBキーボードを有効にする
enable_usb_kbd = true

; UARTキーボードを有効にする
;enable_uart_kbd = true
;uart_baudrate   = 115200
;uart_tx_pin     = 4
;uart_rx_pin     = 5


; キー押下継続時間 (ms)
; key_hold_ms = 120

; キーリリース強制タイムアウト (ms)
; key_release_hard_timeout_ms = 1200

; キー間のギャップ (ms)
; inter_key_gap_ms = 80


; -----------------------------------------------------------------------------
[emulator]
; -----------------------------------------------------------------------------

; シリアルコンソール (UART REPL) を無効にする
; boot.py が GP0/GP1 に接続した UART0 REPL を停止する (USB CDC REPL には影響しない)
enable_repl_uart = true

; フレーム更新間隔 (ms) — 33ms ≒ 30fps
; frame_interval_ms = 33

; 1スライスあたりのCPUステップ数
active_step_count = 14000

; スリープ中のポーリング間隔 (ms)
; sleep_poll_ms = 10

; タイマーティック換算ステップ数
; step_timer_tick_steps = 8000

; メインループのアイドル待機 (ms)
; loop_idle_ms = 1


; -----------------------------------------------------------------------------
[disk]
; -----------------------------------------------------------------------------

; 仮想FDDを有効にする
enabled = true

; ストレージバックエンド: raw
backend = raw

; ディスクイメージファイルのパス
path = /sd/disks/disk1.img

; 読み取り専用
readonly = false


; -----------------------------------------------------------------------------
[profile]
; -----------------------------------------------------------------------------

; 起動時のデフォルトプロファイル名
; default_profile = default

; プロファイル選択UIのタイムアウト (ms)
ui_timeout_ms = 30000


; -----------------------------------------------------------------------------
[joystick]
; -----------------------------------------------------------------------------

; Atari 9ピンジョイスティックを有効にする
;enable = true

; FIRE2ボタンを有効にする
;enable_fire2 = true

; デバウンス時間 (ms)
; debounce_ms = 20

; ポーリング間隔 (ms)
; poll_interval_ms = 10

; キーマッピング
;   指定方法:
;     名前    : exe, ans, shift, up, down, left, right, bs, ins, brk,
;               newall, menu, cal, cls, kana, a-z, 0-9
;     座標直接: row,col  例) 10,4
;   省略するとデフォルト値を使用します。
;
; key_up    = up      ; デフォルト: カーソル上
; key_down  = down    ; デフォルト: カーソル下
; key_left  = left    ; デフォルト: カーソル左
; key_right = right   ; デフォルト: カーソル右
; key_fire1 = exe     ; デフォルト: EXE
; key_fire2 = shift   ; デフォルト: SHIFT

[beep]
enable   = true
gpio_pin = 14
freq_hz  = 3000
;freq_hz  = 4470
duty     = 5 
;duty     = 30


; -----------------------------------------------------------------------------
[touch]
; -----------------------------------------------------------------------------

; タッチパネルの座標補正オフセット (ピクセル単位、正負両方可)
; 省略するとドライバ別の内蔵デフォルト値を使用します。
;   ST7796  (480x320): x_offset=8  y_offset=-4  funckey_x_offset=8  funckey_y_offset=-8
;   ILI9341 (320x240): x_offset=0  y_offset=-104 funckey_x_offset=0  funckey_y_offset=24
;
; LCDエリア (TK1..TK16) 用
; x_offset = 8
; y_offset = -4
;
; シートキーバー (FBAR) 用
; funckey_x_offset = 8
; funckey_y_offset = -8


; -----------------------------------------------------------------------------
[pio_uart]
; -----------------------------------------------------------------------------

; PIO UART (RS-232C) のボーレート (GP6=TX / GP13=RX)
baudrate = 9600


; -----------------------------------------------------------------------------
[wifi]
; -----------------------------------------------------------------------------
; WiFiのSSID。NTP同期を行う場合に設定してください。空欄の場合は同期をスキップします。
ssid = XXXXX
; WiFiのパスワード。
password = XXXXX


; -----------------------------------------------------------------------------
[ntp]
; -----------------------------------------------------------------------------
; エミュレータ起動時のNTP同期を有効にする (WiFi接続が必要です)
;enable = true
enable = false

; NTPサーバのアドレス
server = pool.ntp.org

; タイムゾーンの時差 (JSTの場合は 9)
tz_offset_h = 9

; 接続タイムアウト時間 (ミリ秒)
timeout_ms = 15000
